server {
    listen 80;
    server_name waitzero.site www.waitzero.site;

    # Let's Encrypt 인증서 발급용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP → HTTPS 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name waitzero.site www.waitzero.site;

    ssl_certificate /etc/letsencrypt/live/waitzero.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/waitzero.site/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Flutter Web 정적 파일 서빙
    root /usr/share/nginx/html;
    index index.html;

    # Flutter Web SPA — 모든 경로를 index.html로 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API 리버스 프록시
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
