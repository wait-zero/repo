services:
  mysql:
    image: mysql:8.0
    container_name: waitzero-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: waitzero1234
      MYSQL_DATABASE: waitzero
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Seoul
    volumes:
      - waitzero-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-pwaitzero1234"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: waitzero-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: waitzero
      DB_USERNAME: root
      DB_PASSWORD: waitzero1234
      PUBLIC_DATA_API_KEY: KrsWGCdOe0HyHQ07PKpm2WNslVARbrEbfQwVIGs5unvwr6wGeHwOx/n9aQQSyJHvZ8ZVKe24Wm2SF8q89rRFZQ==
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  waitzero-mysql-data:
